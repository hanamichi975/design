/* ════════════ IndexedDB (PDF 원본 보관) ════════════ */
function idb() {
  return new Promise((res, rej) => {
    const r = indexedDB.open("evalsys_pdfs", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("pdfs");
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function pdfPut(id, buf) {
  const db = await idb();
  return new Promise((res, rej) => {
    const tx = db.transaction("pdfs", "readwrite");
    tx.objectStore("pdfs").put(buf, id);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function pdfGet(id) {
  const db = await idb();
  return new Promise((res, rej) => {
    const q = db.transaction("pdfs").objectStore("pdfs").get(id);
    q.onsuccess = () => res(q.result || null); q.onerror = () => rej(q.error);
  });
}
async function pdfDel(id) {
  const db = await idb();
  return new Promise((res) => { const tx = db.transaction("pdfs","readwrite"); tx.objectStore("pdfs").delete(id); tx.oncomplete = res; });
}

function bufToB64(buf) {

/* ════════════ PDF 추출·파일명 파싱·표지 메타 (FR-1.2) ════════════ */

async function extractPdf(buf) {
  if (!window.pdfjsLib) throw new Error("pdf.js 로드 실패 — 인터넷 연결을 확인하세요.");
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
  const doc = await pdfjsLib.getDocument({
    data: buf.slice(0),
    cMapUrl: "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/",
    cMapPacked: true,
    standardFontDataUrl: "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/standard_fonts/",
  }).promise;
  const pages = [];
  for (let i = 1; i <= doc.numPages; i++) {
    const page = await doc.getPage(i);
    const tc = await page.getTextContent();
    // 줄 복원: y좌표 그룹핑
    const lines = {};
    for (const it of tc.items) {
      const y = Math.round(it.transform[5]);
      (lines[y] = lines[y] || []).push(it);
    }
    const text = Object.keys(lines).map(Number).sort((a,b) => b - a)
      .map(y => lines[y].sort((a,b) => a.transform[4] - b.transform[4]).map(i => i.str).join(" ").trim())
      .filter(Boolean).join("\n");
    let label = "";
    const m = text.trim().match(/-\s*(\d+)\s*-\s*$/) || text.match(/\n-\s*(\d+)\s*-/);
    if (m) label = `- ${m[1]} -`; else if (i === 1) label = "표지";
    pages.push({pdfPage: i, label, text});
  }
  const fullText = pages.map(p => `[${p.label || "PDF p." + p.pdfPage}]\n${p.text}`).join("\n\n");
  const err = pages.some(p => p.text.trim()) ? "" : "텍스트가 추출되지 않았습니다(스캔본 PDF일 수 있음). HWP는 PDF 변환본을 사용하세요.";
  return {fullText, pages, err};
}
function coverMeta(pages) {
  const meta = {titleKr:"", titleEn:"", keywords:"", researchers:"", advisorName:""};
  if (!pages.length) return meta;
  const lines = pages[0].text.split("\n").map(l => l.trim()).filter(Boolean);
  for (const line of lines) {
    let m = line.match(/(?:관련\s*분야\s*)?키워드\s*[:：]?\s*(.+)/);
    if (m && !meta.keywords) { meta.keywords = m[1].trim(); continue; }
    m = line.match(/지도\s*교사\s*[:：]?\s*([가-힣]{2,5})/);
    if (m && !meta.advisorName) { meta.advisorName = m[1]; continue; }
    m = line.match(/(?:프로젝트명|연구\s*주제|제목)\s*\(?(?:한글|국문)?\)?\s*[:：]\s*(.+)/);
    if (m && !meta.titleKr) meta.titleKr = m[1].trim();
  }
  for (const line of lines) {
    const letters = line.replace(/[^A-Za-z]/g, "");
    if (letters.length >= 15 && letters.length / Math.max(line.length, 1) > 0.5) { meta.titleEn = line; break; }
  }
  const stop = new Set(["학년도","년도","학기","학번","학년"]);
  const found = [];
  for (const line of lines)
    for (const m of line.matchAll(/(\d{4})\s*([가-힣]{2,4})/g))
      if (!stop.has(m[2])) found.push(`${m[1]} ${m[2]}`);
  if (!found.length) {
    for (const line of lines)
      if (/연구자|연구원|팀원|명단/.test(line)) {
        for (const n of line.match(/[가-힣]{2,4}/g) || [])
          if (!["연구자","연구원","팀원","명단","지도교사"].includes(n)) found.push(n);
        break;
      }
  }
  meta.researchers = found.join(", ");
  if (!meta.titleKr) {
    const cands = lines.slice(0, 10).filter(l => l.replace(/[^가-힣]/g, "").length >= 8 && !/창의융합|보고서|대전과학|학년도|지도교사/.test(l));
    if (cands.length) meta.titleKr = cands.reduce((a,b) => a.length >= b.length ? a : b);
  }
  return meta;
}
function quoteInText(quote, full) {
  if (!quote || !full) return false;
  const norm = s => s.replace(/\s+/g, "");
  const q = norm(quote);
  if (q.length < 6) return false;
  const body = norm(full);
  if (body.includes(q)) return true;
  const q2 = q.replace(/["'“”‘’…·\[\]()]/g, "");
  return q2.length >= 6 && (body.includes(q2) || body.includes(q2.slice(0, 20)));
}

/* ════════════ 집계·수준·플래그 (FR-3.4, FR-3.5) ════════════ */
const levelOf = (item, score) => score == null ? null : (item.levels.find(lv => score >= lv.min && score <= lv.max) || item.levels.at(-1)).level;
function levelIdx(item, score) {
  const name = levelOf(item, score);
  const i = item.levels.findIndex(lv => lv.level === name);
  return i < 0 ? item.levels.length - 1 : i;
}
function totalLevelIdx(total) {
  if (total == null) return null;
  const n = S.rubric[0].levels.length;
  for (let i = 0; i < n; i++) {
    const floor = S.rubric.reduce((sum, it) => sum + it.levels[i].min, 0);
    if (total >= floor) return i;
  }
  return n - 1;
}
function confirmedEvals(rid) {
  return S.evaluations.filter(v => v.reportId === rid && v.status === "확정").map(v => {
    const a = S.assignments.find(x => x.reportId === rid && x.evaluatorId === v.evaluatorId);
    const total = S.rubric.reduce((sum, it) => sum + (v.scores[it.no] ?? 0), 0);
    return {evaluatorId: v.evaluatorId, name: evaluator(v.evaluatorId)?.name || "?", role: a?.role || "교차검토",
            scores: v.scores, total, ethics: v.ethics, confirmedAt: v.confirmedAt};
  });
}
function aggregate(rid) {
  const evals = confirmedEvals(rid);
  const nAssigned = S.assignments.filter(a => a.reportId === rid).length;
  let used = evals;
  if (S.settings.aggMode === "교차 2인 평균") {
    const cross = evals.filter(e => e.role === "교차검토");
    if (cross.length) used = cross;
  }
  let avgTotal = null; const avgItems = {};
  if (used.length) {
    avgTotal = round1(used.reduce((s, e) => s + e.total, 0) / used.length);
    for (const it of S.rubric) {
      const vals = used.map(e => e.scores[it.no]).filter(v => v != null);
      if (vals.length) avgItems[it.no] = round1(vals.reduce((a,b) => a+b, 0) / vals.length);
    }
  }
  let flagged = false; const flagDetail = [];
  if (evals.length >= 2) {
    const u = S.settings.flagUnit;
    if (u === "항목별" || u === "둘다")
      for (const it of S.rubric) {
        const idxs = evals.map(e => e.scores[it.no]).filter(v => v != null).map(v => levelIdx(it, v));
        if (idxs.length && Math.max(...idxs) - Math.min(...idxs) >= 2) {
          flagged = true; flagDetail.push(`항목 ${it.no}(${it.name}) 수준차 ${Math.max(...idxs)-Math.min(...idxs)}단계`);
        }
      }
    if (u === "총점" || u === "둘다") {
      const idxs = evals.map(e => totalLevelIdx(e.total));
      if (idxs.length && Math.max(...idxs) - Math.min(...idxs) >= 2) {
        flagged = true; flagDetail.push(`총점 수준차 ${Math.max(...idxs)-Math.min(...idxs)}단계`);
      }
    }
  }
  const adjusted = S.adjustments.find(a => a.reportId === rid) || null;
  return {evals, nAssigned, complete: nAssigned >= 3 && evals.length >= nAssigned,
          avgTotal, avgItems, flagged, flagDetail, adjusted,
          finalTotal: adjusted ? adjusted.finalTotal : avgTotal,
          ethicsFlag: evals.some(e => e.ethics === "예")};
}
function gradeOf(t100) {
  if (t100 == null) return null;
  if (t100 >= +S.settings.aCut) return "A";
  if (t100 >= +S.settings.bCut) return "B";

}

async function callClaude(body) {
  if (!apiKey()) throw new Error("API 키가 설정되지 않았습니다. [설정] 탭에서 ANTHROPIC API 키를 입력하세요.");

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"x-api-key": apiKey(), "anthropic-version": "2023-06-01",
                  "anthropic-dangerous-direct-browser-access": "true", "content-type": "application/json"},
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const t = await res.text();
        throw new Error(`API 오류 ${res.status}: ${t.slice(0, 300)}`);
      }
      return await res.json();
    } catch (e) {
      lastErr = e;
      if (attempt < 2) await new Promise(r => setTimeout(r, 3000 * (attempt + 1)));
    }
  }
  throw lastErr;
}

function validateAiResult(result, fullText) {
  const warnings = [];
  const byNo = Object.fromEntries(S.rubric.map(it => [it.no, it]));
  const seen = new Set();
  for (const item of result.items || []) {
    const it = byNo[item.no];
    if (!it) { warnings.push(`알 수 없는 항목 번호 ${item.no}`); continue; }
    seen.add(item.no);
    if (!Number.isInteger(item.score) || item.score < 0 || item.score > it.max) {
      const old = item.score;
      item.score = Math.max(0, Math.min(Math.round(+item.score || 0), it.max));
      warnings.push(`항목 ${item.no} 점수 ${old} → ${item.score}로 보정(배점 ${it.max}점)`);
    }
    for (const c of item.citations || []) {
      c.verified = quoteInText(c.quote, fullText);
      if (!c.verified) warnings.push(`항목 ${item.no} 인용 미확인: "${(c.quote || "").slice(0, 30)}…"`);
    }
  }
  const missing = S.rubric.filter(it => !seen.has(it.no)).map(it => it.no);
  if (missing.length) warnings.push(`누락된 항목: ${missing.join(", ")}`);
  return warnings;
}

function compareRuns(rid) {
  const runs = S.aiEvals.filter(a => a.reportId === rid);

  const [prev, latest] = [runs.at(-2).result, runs.at(-1).result];

    const a = (latest.items || []).find(x => x.no === it.no);
    const b = (prev.items || []).find(x => x.no === it.no);
    if (!a || !b) return null;
    const d = Math.abs(levelIdx(it, a.score) - levelIdx(it, b.score));

    messages: [{role:"user", content: text}],
  });
  const draft = toolInput(resp, "record_draft").draft.trim();
  let rec = recOf(sid);
  if (!rec) { rec = {studentId: sid, draft:"", final:"", updatedAt:""}; S.records.push(rec); }
  rec.draft = draft; rec.updatedAt = now();
  audit("특기사항 생성", `student=${sid}`);
  save();
  return draft;
}
function similarity(a, b) {
  const grams = s => { s = (s || "").replace(/\s+/g, ""); const g = new Set(); for (let i = 0; i < s.length - 1; i++) g.add(s.slice(i, i + 2)); return g; };
  const ga = grams(a), gb = grams(b);
  if (!ga.size || !gb.size) return 0;
  let inter = 0; for (const x of ga) if (gb.has(x)) inter++;
  return inter / (ga.size + gb.size - inter);
}

/* ════════════ 보고서 등록 (업로드) ════════════ */
async function importPdfFiles(fileList, forcedTeamId=null) {
  const msgs = [];
  for (const file of fileList) {
    if (!file.name.toLowerCase().endsWith(".pdf")) { msgs.push(`'${file.name}': PDF가 아니어서 건너뜀`); continue; }
    if (S.reports.some(r => r.filename === file.name)) { msgs.push(`'${file.name}': 이미 등록됨 — 건너뜀`); continue; }
    const buf = await file.arrayBuffer();
    const {advisor, rep} = parseFilename(file.name);
    let teamId = forcedTeamId || matchTeam(advisor, rep);
    if (teamId && S.reports.some(r => r.teamId === teamId)) {
      msgs.push(`'${file.name}': 해당 팀 보고서가 이미 있음(상세에서 수정본 재업로드 사용)`); continue;
    }
    let fullText = "", pages = [], err = "";
    try { ({fullText, pages, err} = await extractPdf(buf)); }
    catch (e) { err = "PDF 추출 실패: " + e.message; }
    const meta = coverMeta(pages);
    if (advisor && !meta.advisorName) meta.advisorName = advisor;
    const id = S.seq.report++;
    S.reports.push({id, teamId, filename: file.name, uploadedAt: now(), version: 1,
      plagRate: null, plagChecks: 0, status: "제출",
      titleKr: meta.titleKr, titleEn: meta.titleEn, keywords: meta.keywords,
      researchers: meta.researchers, advisorName: meta.advisorName, repStudent: rep || "",
      fullText, pages, extractError: err});
    await pdfPut(id, buf);
    audit("보고서 업로드", file.name);
    msgs.push(`'${file.name}' 등록 완료${teamId ? ` → ${team(teamId).name}` : " ⚠ 팀 자동 매칭 실패(상세에서 지정)"}${err ? " ⚠ " + err : ""}`);
  }
  save();
  return msgs;
}

function assignmentWarnings() {
  const w = [];
  for (const a of S.assignments) {
    const r = report(a.reportId); if (!r || !r.teamId) continue;
    const t = team(r.teamId);
    if (a.role === "교차검토" && t.advisorId === a.evaluatorId)
      w.push(`⚠ ${evaluator(a.evaluatorId).name} 교사가 자신이 지도하는 팀(${t.name})의 교차검토로 배정되어 있습니다.`);
    if (a.role === "지도교사" && t.advisorId !== a.evaluatorId)
      w.push(`⚠ ${t.name} 팀의 '지도교사' 역할(${evaluator(a.evaluatorId).name})이 실제 지도교사와 다릅니다.`);
  }
  const loads = {};
  for (const a of S.assignments) loads[a.evaluatorId] = (loads[a.evaluatorId] || 0) + 1;
  for (const [eid, n] of Object.entries(loads))
    if (n > 3) w.push(`⚠ ${evaluator(+eid).name} 평가위원의 배정이 ${n}건으로 3건을 초과합니다.`);
  return w;
}
function autoAssign() {
  const loads = {};
  for (const e of S.evaluators) if (!e.isAdmin) loads[e.id] = 0;
  for (const a of S.assignments) if (loads[a.evaluatorId] != null) loads[a.evaluatorId]++;
  let n = 0;
  for (const r of S.reports.filter(r => r.teamId)) {
    const t = team(r.teamId);
    const existing = new Set(S.assignments.filter(a => a.reportId === r.id).map(a => a.evaluatorId));
    if (t.advisorId && !existing.has(t.advisorId)) {
      S.assignments.push({reportId: r.id, evaluatorId: t.advisorId, role: "지도교사"});
      loads[t.advisorId]++; existing.add(t.advisorId); n++;
    }
    while (existing.size < 3) {
      const cands = S.evaluators.filter(e => !e.isAdmin && !existing.has(e.id) && e.id !== t.advisorId);
      if (!cands.length) break;
      const pick = cands.reduce((a, b) => loads[a.id] <= loads[b.id] ? a : b);
      S.assignments.push({reportId: r.id, evaluatorId: pick.id, role: "교차검토"});
      loads[pick.id]++; existing.add(pick.id); n++;
    }
  }
  audit("자동 배정", `${n}건 추가`); save();
  return n;
}

window.saveMeta = rid => {

    flash("해당 팀에는 이미 다른 보고서가 연결되어 있습니다.", true); return;
  }
  r.teamId = newTeam;

window.setPlag = rid => {
  const r = report(rid);
  const rate = parseFloat(document.getElementById("plag-rate").value);
  if (isNaN(rate)) { flash("표절률은 숫자로 입력하세요.", true); return; }
  r.plagChecks = (r.plagChecks || 0) + 1;
  r.plagRate = rate;
  r.status = rate < +S.settings.threshold ? "평가가능" : (r.plagChecks <= 1 ? "재제출 대기" : "미이수");
  audit("표절률 입력", `${r.filename} ${rate}% (${r.plagChecks}차) → ${r.status}`);
  save(); flash(`표절률 ${rate}% 입력(${r.plagChecks}차 검사) → 상태: ${r.status}`); render();
};
window.reupload = async rid => {
  const f = document.getElementById("reup-file").files[0];
  if (!f) { flash("PDF 파일을 선택하세요.", true); return; }
  const r = report(rid);
  const buf = await f.arrayBuffer();
  let fullText = "", pages = [], err = "";
  try { ({fullText, pages, err} = await extractPdf(buf)); } catch (e) { err = "추출 실패: " + e.message; }
  Object.assign(r, {filename: f.name, uploadedAt: now(), version: (r.version || 1) + 1, fullText, pages, extractError: err});
  await pdfPut(rid, buf);
  audit("수정본 재업로드", `${f.name} v${r.version}`);
  save(); flash("수정본을 업로드했습니다. 표절률을 다시 입력하면 게이트가 재판정됩니다."); render();
};

function vAssignments() {
  const warnings = assignmentWarnings();

  const evs = S.evaluators.filter(e => !e.isAdmin);
  const reps = S.reports.filter(r => r.teamId).sort((a,b) => {

  const opt = (sel, advisorId) => `<option value="">—</option>` + evs.map(e =>
    `<option value="${e.id}" ${e.id === sel ? "selected" : ""} ${e.id === advisorId ? 'style="color:#b32020"' : ""}>

  return `<h1>평가 배정 (보고서 1건당 3인: 지도교사 1 + 교차검토 2)</h1>

  <table class="list"><tr><th>분야</th><th>팀</th><th>상태</th><th>지도교사 (1차)</th><th>교차검토 1</th><th>교차검토 2</th><th></th></tr>
  ${reps.map(r => {
    const t = team(r.teamId);
    const as = S.assignments.filter(a => a.reportId === r.id);
    const adv = as.find(a => a.role === "지도교사");
    const cross = as.filter(a => a.role === "교차검토");
    return `<tr>
      <td>${esc(t.field)}</td>
      <td><b>${esc(t.name)}</b><div class="muted">지도: ${esc(evaluator(t.advisorId)?.name || "—")}</div></td>
      <td>${statusBadge(r)}</td>
      <td><select id="as-adv-${r.id}">${opt(adv?.evaluatorId ?? t.advisorId, null)}</select></td>
      <td><select id="as-c1-${r.id}">${opt(cross[0]?.evaluatorId, t.advisorId)}</select></td>
      <td><select id="as-c2-${r.id}">${opt(cross[1]?.evaluatorId, t.advisorId)}</select></td>
      <td><button class="btn-sm" onclick="saveAssign(${r.id})">저장</button></td></tr>`;
  }).join("") || `<tr><td colspan="7" class="center muted">팀에 연결된 보고서가 없습니다.</td></tr>`}</table>
  <p class="muted">⚠ 표시는 해당 평가위원이 그 팀의 지도교사임을 뜻합니다(교차검토 배정 금지 — 같은 교사의 다른 지도 팀 포함).

window.doAutoAssign = () => {
  if (!confirm("비어 있는 배정을 자동으로 채웁니다. 기존 배정은 유지됩니다. 진행할까요?")) return;
  const n = autoAssign();
  flash(`자동 배정 완료: ${n}건 추가.`);
  assignmentWarnings().forEach(w => flash(w, true));
  render();
};
window.saveAssign = rid => {
  if (S.evaluations.some(v => v.reportId === rid && v.status === "확정")) {
    flash("확정된 평가가 있는 보고서의 배정은 변경할 수 없습니다(확정 해제 후 가능).", true); return;
  }
  S.assignments = S.assignments.filter(a => a.reportId !== rid);
  const seen = new Set();
  for (const [key, role] of [["adv","지도교사"],["c1","교차검토"],["c2","교차검토"]]) {
    const eid = +document.getElementById(`as-${key}-${rid}`).value;
    if (!eid) continue;
    if (seen.has(eid)) { flash("⚠ 동일 평가위원이 중복 선택되어 한 번만 배정되었습니다.", true); continue; }
    seen.add(eid);
    S.assignments.push({reportId: rid, evaluatorId: eid, role});
  }
  audit("배정 변경", `report=${rid}`); save();
  assignmentWarnings().forEach(w => flash(w, true));
  flash("배정을 저장했습니다."); render();
};

window.saveMyEval = (rid, confirm_) => {
  let v = myEval(rid, me.id);
  if (v && v.status === "확정") { flash("확정된 평가는 수정할 수 없습니다.", true); return; }
  if (!v) { v = {reportId: rid, evaluatorId: me.id, status: "작성중", confirmedAt: null, scores:{}, comments:{}, ethics:"", ethicsComment:""}; S.evaluations.push(v); }
  for (const it of S.rubric) {
    const raw = document.getElementById(`sc-${it.no}`).value;
    v.scores[it.no] = raw === "" ? null : Math.max(0, Math.min(+raw, it.max));
    v.comments[it.no] = document.getElementById(`cm-${it.no}`).value.trim();
  }
  v.ethics = document.querySelector('input[name="ethics"]:checked')?.value || "";
  v.ethicsComment = document.getElementById("ethics-cm").value.trim();
  if (confirm_) {
    const missing = S.rubric.filter(it => v.scores[it.no] == null).map(it => it.no);
    if (missing.length || !["예","아니오"].includes(v.ethics)) {
      save();
      const msg = [];
      if (missing.length) msg.push(`항목 ${missing.join(", ")} 점수 미입력`);
      if (!["예","아니오"].includes(v.ethics)) msg.push("연구윤리(항목 5) 판정 미선택");
      flash("확정 불가: " + msg.join(" / "), true); render(); return;
    }
    if (!confirm("평가를 확정하면 관리자 승인 없이 수정할 수 없습니다. 확정할까요?")) { save(); return; }
    v.status = "확정"; v.confirmedAt = now();
    const total = S.rubric.reduce((s, it) => s + v.scores[it.no], 0);
    audit("평가 확정", `report=${rid} 합계=${total}`);
    save(); flash("평가를 확정했습니다. 이제 다른 평가자의 확정 점수를 볼 수 있습니다.");
  } else {
    audit("평가 임시저장", `report=${rid}`);
    save(); flash("임시 저장했습니다.");
  }
  render();
};

function downloadFile(name, blob) {
  const a = document.createElement("a");

  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
window.exportScoresXlsx = () => {
  if (!window.XLSX) { flash("Excel 라이브러리 로드 실패 — 인터넷 연결 확인", true); return; }
  const head = ["팀명","분야","연구주제","지도교사","표절률(%)","상태"];
  for (let i = 1; i <= 3; i++) head.push(`평가자${i}`, `역할`, ...S.rubric.map(it => `항목${it.no}`), "합계", "윤리");
  head.push("평균(집계)","플래그","플래그 사유","조정 점수","조정 사유","최종 점수");
  const rows = [head];
  for (const t of sortTeams()) {
    const rep = reportOf(t.id);
    const row = [t.name, t.field, rep?.titleKr || t.topic, evaluator(t.advisorId)?.name || ""];
    if (!rep) { rows.push([...row, "", "미제출"]); continue; }
    row.push(rep.plagRate, rep.status);
    const agg = aggregate(rep.id);
    const evs = [...agg.evals].sort((a, b) => (a.role === "지도교사" ? 0 : 1) - (b.role === "지도교사" ? 0 : 1));
    for (let i = 0; i < 3; i++) {
      const e = evs[i];
      if (e) row.push(e.name, e.role, ...S.rubric.map(it => e.scores[it.no]), e.total, e.ethics);
      else row.push("", "", ...S.rubric.map(() => ""), "", "");
    }
    row.push(agg.avgTotal, agg.flagged ? "조정회의 대상" : "", agg.flagDetail.join("; "),
      agg.adjusted?.finalTotal ?? "", agg.adjusted?.reason ?? "", agg.finalTotal);
    rows.push(row);
  }
  const rows2 = [["학번","이름","팀명","분야","보고서(30)","과정(40)","에세이(30)","총점(100)","등급(참고)"]];
  for (const s of [...S.students].sort((a, b) => (a.no || "").localeCompare(b.no || ""))) {
    const t = team(s.teamId);
    const rep = reportOf(s.teamId);
    const rs = rep ? aggregate(rep.id).finalTotal : null;
    const total = (rs != null && s.course != null && s.essay != null) ? round1(rs + s.course + s.essay) : null;
    rows2.push([s.no, s.name, t.name, t.field, rs, s.course, s.essay, total, total != null ? gradeOf(total) : ""]);
  }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "팀별 점수");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows2), "학생별 점수");
  XLSX.writeFile(wb, "창의융합설계연구_점수표.xlsx");
};

window.restoreBackup = async () => {
  const f = document.getElementById("restore-file").files[0];
  if (!f) { flash("백업 파일을 선택하세요.", true); return; }
  if (!confirm("현재 데이터가 백업 시점으로 완전히 대체됩니다. 진행할까요?")) return;
  try {
    const data = JSON.parse(await f.text());
    if (data.type !== "backup" || !data.state) throw new Error("올바른 백업 파일이 아닙니다.");
    S = data.state;
    if (data.pdfs) for (const [id, b64] of Object.entries(data.pdfs)) await pdfPut(+id, b64ToBuf(b64));

window.exportMyEvals = () => {

window.mergeEvals = async () => {
  const files = document.getElementById("merge-file").files;
  if (!files.length) { flash("JSON 파일을 선택하세요.", true); return; }
  let n = 0;
  for (const f of files) {
    try {
      const data = JSON.parse(await f.text());
      if (data.type !== "evaluations") throw new Error("평가 내보내기 파일이 아님");
      const ev = S.evaluators.find(e => e.name === data.evaluatorName);
      if (!ev) { flash(`'${data.evaluatorName}' 평가위원이 명단에 없습니다.`, true); continue; }
      for (const v of data.evaluations) {
        // 파일명으로 보고서 재매칭 (PC 간 id가 다를 수 있음)
        const rep = S.reports.find(r => r.filename === v.reportFilename) || report(v.reportId);
        if (!rep) continue;
        S.evaluations = S.evaluations.filter(x => !(x.reportId === rep.id && x.evaluatorId === ev.id));
        S.evaluations.push({...v, reportId: rep.id, evaluatorId: ev.id});
        n++;
      }
      audit("평가 병합", `${data.evaluatorName} ${data.evaluations.length}건`);
    } catch (e) { flash(`'${f.name}' 병합 실패: ${e.message}`, true); }
  }
  save(); flash(`평가 ${n}건을 병합했습니다.`); render();
};

      <tr><th>평가 기간</th><td><input type="date" id="set-start" value="${S.settings.evalStart}"> ~
        <input type="date" id="set-end" value="${S.settings.evalEnd}"></td></tr>
      <tr><th>표절률 기준(%)</th><td><input type="number" id="set-th" value="${S.settings.threshold}" step="0.1" style="width:80px"></td></tr>
      <tr><th>특기사항 기본 분량(자)</th><td><input type="number" id="set-len" value="${S.settings.recordLen}" style="width:80px"></td></tr>
      <tr><th>등급 경계 (A / B)</th><td>A ≥ <input type="number" id="set-a" value="${S.settings.aCut}" step="0.1" style="width:70px">
        , B ≥ <input type="number" id="set-b" value="${S.settings.bCut}" step="0.1" style="width:70px"></td></tr>
      <tr><th>관리자 코드 변경</th><td><input type="text" id="set-admin" placeholder="변경 시에만 입력"></td></tr>
    </table>
    <button onclick="saveSettings()">일반 설정 저장</button></div>
  <div class="card"><h2 style="margin-top:0">앵커 예시 등록 (AI 캘리브레이션, FR-2.4)</h2>
    <p class="muted">A·B·C 수준별 앵커 보고서의 특징 요약을 등록하면 AI 평가 프롬프트에 포함되어 점수 인플레이션을 억제합니다.</p>
    <table class="list"><tr><th>수준</th><th>제목</th><th>요약</th><th></th></tr>
    ${S.anchors.map((a, i) => `<tr><td>${esc(a.grade)}</td><td>${esc(a.title)}</td>
      <td><pre class="prewrap">${esc(a.summary.slice(0, 300))}</pre></td>
      <td><button class="btn-sm btn-danger" onclick="delAnchor(${i})">삭제</button></td></tr>`).join("")}</table>
    <div style="margin-top:8px">
      <select id="anchor-grade"><option>A</option><option>B</option><option>C</option></select>
      <input type="text" id="anchor-title" placeholder="앵커 보고서 제목" style="width:280px">
      <textarea id="anchor-summary" rows="4" placeholder="이 수준의 특징 요약"></textarea>
      <button style="margin-top:6px" onclick="addAnchor()">앵커 등록</button></div></div>
  <div class="card"><h2 style="margin-top:0">루브릭 (데이터로 정의 — 연도별 교체 가능)</h2>
    <textarea id="set-rubric" rows="14" style="font-family:monospace">${esc(JSON.stringify(S.rubric, null, 2))}</textarea>
    <button style="margin-top:6px" onclick="saveRubric()">루브릭 저장</button></div>
  <div class="card"><h2 style="margin-top:0">AI 프롬프트 (교사 수정 가능)</h2>
    <h3>평가 프롬프트</h3>
    <textarea id="set-p-eval" rows="12" style="font-family:monospace">${esc(S.prompts.eval)}</textarea>
    <h3>특기사항 프롬프트</h3>
    <textarea id="set-p-rec" rows="10" style="font-family:monospace">${esc(S.prompts.record)}</textarea>
    <button style="margin-top:6px" onclick="savePrompts()">프롬프트 저장</button></div>
  <div class="card"><h2 style="margin-top:0">초기화</h2>
    <button class="btn-danger" onclick="resetAll()">전체 데이터 초기화 (시드 상태로)</button>
    <span class="muted">모든 보고서·평가·특기사항이 삭제됩니다. 먼저 백업하세요.</span></div>
  <p><a onclick="go('audit')">감사 로그(점수 변경 이력) 보기 →</a></p>`;
}
window.saveKey = () => { localStorage.setItem(KEY_KEY, document.getElementById("set-key").value.trim()); flash("API 키를 저장했습니다."); render(); };
window.clearKey = () => { localStorage.removeItem(KEY_KEY); flash("API 키를 삭제했습니다."); render(); };
window.saveSettings = () => {
  const s = S.settings;
  s.aggMode = document.getElementById("set-agg").value;
  s.flagUnit = document.getElementById("set-flag").value;
  s.aiModel = document.getElementById("set-model").value.trim();
  s.submitDeadline = document.getElementById("set-deadline").value.trim();
  s.evalStart = document.getElementById("set-start").value;
  s.evalEnd = document.getElementById("set-end").value;
  s.threshold = +document.getElementById("set-th").value || 20;
  s.recordLen = +document.getElementById("set-len").value || 1000;
  s.aCut = +document.getElementById("set-a").value || 85;
  s.bCut = +document.getElementById("set-b").value || 70;
  const ac = document.getElementById("set-admin").value.trim();
  if (ac) S.evaluators.find(e => e.isAdmin).code = ac;
  audit("설정 변경", "일반 설정"); save(); flash("설정을 저장했습니다."); render();
};
window.addAnchor = () => {
  const title = document.getElementById("anchor-title").value.trim();
  const summary = document.getElementById("anchor-summary").value.trim();
  if (!title || !summary) { flash("제목과 요약을 입력하세요.", true); return; }
  S.anchors.push({grade: document.getElementById("anchor-grade").value, title, summary});
  audit("앵커 등록", title); save(); render();
};
window.delAnchor = i => { S.anchors.splice(i, 1); save(); render(); };
window.saveRubric = () => {
  if (!confirm("루브릭을 변경하면 기존 평가와의 정합성을 직접 확인해야 합니다. 저장할까요?")) return;
  try {
    const items = JSON.parse(document.getElementById("set-rubric").value);
    if (!Array.isArray(items) || !items.length) throw new Error("배열이 아닙니다");
    for (const it of items) if (it.no == null || !it.name || !it.max || !it.levels) throw new Error("no/name/max/levels 필수");
    S.rubric = items;
    audit("루브릭 변경"); save(); flash("루브릭을 저장했습니다."); render();
  } catch (e) { flash("루브릭 JSON 형식 오류: " + e.message, true); }
};
window.savePrompts = () => {
  S.prompts.eval = document.getElementById("set-p-eval").value;
  S.prompts.record = document.getElementById("set-p-rec").value;
  audit("프롬프트 수정"); save(); flash("프롬프트를 저장했습니다.");
};
window.resetAll = async () => {
  if (!confirm("모든 데이터가 삭제되고 초기 시드 상태로 돌아갑니다. 계속할까요?")) return;
  if (!confirm("정말 초기화할까요? 백업하지 않았다면 취소하세요.")) return;
  for (const r of S.reports) await pdfDel(r.id);
  S = defaultState(); save();
  me = null; sessionStorage.removeItem("evalsys_login");
  flash("초기화했습니다."); render();
};

/* ── 감사 로그 ── */
function vAudit() {
  return `<h1>감사 로그 (최근 500건)</h1>
  <p><a onclick="go('settings')">← 설정</a></p>
  <table class="list"><tr><th>시각</th><th>사용자</th><th>동작</th><th>상세</th></tr>
  ${S.audit.slice(0, 500).map(l => `<tr><td class="nowrap">${l.ts}</td><td>${esc(l.actor)}</td>
    <td>${esc(l.action)}</td><td class="muted">${esc(l.detail)}</td></tr>`).join("")}</table>`;
}

/* ════════════ 시작 ════════════ */
load();
const savedLogin = sessionStorage.getItem("evalsys_login");
if (savedLogin) { try { me = JSON.parse(savedLogin); } catch(e) {} }
render();
</script>
</body>
</html>
